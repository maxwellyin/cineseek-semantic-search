name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          grep -v '^torch==' requirements.txt > requirements.runtime.ci.txt
          grep -v '^torch==' requirements-dev.txt | grep -v '^-r requirements.txt$' > requirements.dev.ci.txt
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r requirements.runtime.ci.txt
          pip install -r requirements.dev.ci.txt

      - name: Compile Python modules
        run: python -m compileall apps/demo flcr

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Smoke check app routes
        run: |
          python - <<'PY'
          from apps.demo.app import app
          paths = {getattr(route, "path", "") for route in app.routes}
          expected = {
              "/",
              "/about",
              "/search",
              "/search/results",
              "/movie",
              "/health",
              "/ops/traffic",
              "/api/config",
              "/api/search",
              "/api/movie",
          }
          missing = sorted(expected - paths)
          if missing:
              raise SystemExit(f"Missing expected routes: {missing}")
          print("App routes OK")
          PY

      - name: Run test suite
        run: pytest

      - name: Validate Docker publish script
        run: |
          bash -n scripts/publish_docker.sh
          bash -n scripts/build_asset_bundle.sh
          bash -n scripts/publish_asset_release.sh
          bash -n scripts/cineseek_deploy.sh
          ./scripts/publish_docker.sh --help
          ./scripts/build_asset_bundle.sh --help
          ./scripts/publish_asset_release.sh --help
          ./scripts/cineseek_deploy.sh --help

  build_and_push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          build-args: |
            ASSET_BUNDLE_URL=https://github.com/${{ github.repository }}/releases/download/assets-current/cineseek-assets.tar.gz
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Upload deploy script to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || '22' }}
          source: scripts/cineseek_deploy.sh
          target: /root
          overwrite: true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /root
            chmod +x /root/scripts/cineseek_deploy.sh
            cp /root/scripts/cineseek_deploy.sh /root/cineseek_deploy.sh
            chmod +x /root/cineseek_deploy.sh
            ./cineseek_deploy.sh
