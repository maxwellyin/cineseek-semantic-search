name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  packages: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          grep -v '^torch$' requirements.txt > requirements.ci.txt
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r requirements.ci.txt

      - name: Compile Python modules
        run: python -m compileall apps/demo flcr

      - name: Smoke check app routes
        run: |
          python - <<'PY'
          from apps.demo.app import app
          paths = {getattr(route, "path", "") for route in app.routes}
          expected = {"/", "/search", "/search/results", "/health", "/ops/traffic"}
          missing = sorted(expected - paths)
          if missing:
              raise SystemExit(f"Missing expected routes: {missing}")
          print("App routes OK")
          PY

      - name: Validate Docker publish script
        run: |
          bash -n scripts/publish_docker.sh
          ./scripts/publish_docker.sh --help

  build_and_push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /root
            ./cineseek_deploy.sh
