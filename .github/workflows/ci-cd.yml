name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          grep -v '^torch$' requirements.txt > requirements.ci.txt
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r requirements.ci.txt

      - name: Compile Python modules
        run: python -m compileall apps/demo flcr

      - name: Smoke check app routes
        run: |
          python - <<'PY'
          from apps.demo.app import app
          paths = {getattr(route, "path", "") for route in app.routes}
          expected = {"/", "/search", "/search/results", "/health", "/ops/traffic"}
          missing = sorted(expected - paths)
          if missing:
              raise SystemExit(f"Missing expected routes: {missing}")
          print("App routes OK")
          PY

      - name: Validate Docker publish script
        run: |
          bash -n scripts/publish_docker.sh
          ./scripts/publish_docker.sh --help

  build_and_push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository }}:latest
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || '22' }}
          script_stop: true
          envs: IMAGE_NAME,GROQ_API_KEY,GOOGLE_API_KEY,GEMINI_API_KEY
          script: |
            set -euo pipefail
            cat > /tmp/cineseek.env <<EOF
            GROQ_API_KEY=${GROQ_API_KEY}
            GOOGLE_API_KEY=${GOOGLE_API_KEY}
            GEMINI_API_KEY=${GEMINI_API_KEY}
            FLCR_AGENT_PROVIDER=groq
            FLCR_GROQ_MODEL=qwen/qwen3-32b
            EOF

            docker pull "${IMAGE_NAME}"
            docker stop cineseek || true
            docker rm cineseek || true
            docker run -d \
              --name cineseek \
              --restart unless-stopped \
              --env-file /tmp/cineseek.env \
              -p 8000:8000 \
              "${IMAGE_NAME}"
