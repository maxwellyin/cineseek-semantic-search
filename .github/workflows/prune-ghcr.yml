name: Prune GHCR Images

on:
  workflow_dispatch:
    inputs:
      keep_versions:
        description: Number of most recent GHCR versions to keep
        required: false
        default: "15"
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * *"

permissions:
  packages: write

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - name: Prune old GHCR versions
        uses: actions/github-script@v7
        env:
          KEEP_VERSIONS: ${{ github.event.inputs.keep_versions || '15' }}
          PACKAGE_NAME: cineseek-semantic-search
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const packageType = "container";
            const packageName = process.env.PACKAGE_NAME;
            const keep = Number.parseInt(process.env.KEEP_VERSIONS || "15", 10);

            if (!Number.isInteger(keep) || keep < 1) {
              core.setFailed(`Invalid KEEP_VERSIONS: ${process.env.KEEP_VERSIONS}`);
              return;
            }

            const versions = await github.paginate(
              github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
              {
                package_type: packageType,
                package_name: packageName,
                username: owner,
                per_page: 100,
              },
            );

            const sorted = versions
              .slice()
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const toDelete = sorted.slice(keep);

            core.info(`Found ${sorted.length} package versions; keeping ${keep}, deleting ${toDelete.length}.`);

            for (const version of toDelete) {
              core.info(`Deleting package version ${version.id} (${version.name})`);
              await github.rest.packages.deletePackageVersionForUser({
                package_type: packageType,
                package_name: packageName,
                username: owner,
                package_version_id: version.id,
              });
            }
