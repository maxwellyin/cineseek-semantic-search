<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1ea;
      --bg-soft: #fbf8f2;
      --ink: #18222f;
      --muted: #5b6778;
      --line: rgba(24, 34, 47, 0.12);
      --accent: #c65d2e;
      --accent-dark: #8b3513;
      --card: rgba(255, 255, 255, 0.76);
      --shadow: 0 18px 48px rgba(24, 34, 47, 0.08);
    }

    html, body {
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(198, 93, 46, 0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(24, 34, 47, 0.08), transparent 24%),
        linear-gradient(180deg, #f8f5ef 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
    }

    .app-shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px 18px 40px;
    }

    .brand-nav {
      backdrop-filter: blur(12px);
      background: rgba(251, 248, 242, 0.76);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 14px 18px;
      margin-bottom: 24px;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--ink);
    }

    .brand-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), #f1b24c);
      box-shadow: 0 0 0 6px rgba(198, 93, 46, 0.12);
    }

    .brand-title {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .brand-subtitle {
      color: var(--muted);
      font-size: 0.92rem;
      margin: 0;
    }

    .nav-pill {
      color: var(--muted);
      text-decoration: none;
      border-radius: 999px;
      padding: 8px 14px;
      transition: all 0.18s ease;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 0.95rem;
    }

    .nav-pill:hover {
      color: var(--ink);
      background: rgba(24, 34, 47, 0.06);
    }

    .page-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: 30px;
      box-shadow: var(--shadow);
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.74rem;
      color: var(--accent-dark);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 700;
    }

    .display-title {
      font-size: clamp(2.4rem, 5vw, 4.4rem);
      line-height: 0.95;
      margin-bottom: 16px;
      max-width: 10ch;
    }

    .lede, .body-copy {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.75;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.35fr 0.95fr;
      gap: 20px;
      align-items: stretch;
    }

    .accent-panel {
      background: linear-gradient(160deg, rgba(24, 34, 47, 0.96), rgba(57, 78, 103, 0.92));
      color: #f7f2ea;
      border-radius: 26px;
      padding: 26px;
      min-height: 100%;
      position: relative;
      overflow: hidden;
    }

    .accent-panel::after {
      content: "";
      position: absolute;
      inset: auto -80px -80px auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(241, 178, 76, 0.32), transparent 65%);
    }

    .metric-grid, .feature-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .metric-card, .feature-card, .result-card {
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      padding: 18px;
    }

    .metric-value {
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .metric-label, .feature-copy, .mini-label {
      color: var(--muted);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .section-title {
      font-size: 1.65rem;
      margin-bottom: 14px;
    }

    .search-form textarea {
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      min-height: 150px;
      padding: 18px 20px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      box-shadow: inset 0 1px 0 rgba(24, 34, 47, 0.04);
    }

    .search-form textarea:focus {
      box-shadow: 0 0 0 0.25rem rgba(198, 93, 46, 0.16);
      border-color: rgba(198, 93, 46, 0.45);
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--accent), #e77d4e);
      color: white;
      border: none;
      border-radius: 999px;
      padding: 12px 20px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .primary-btn:hover {
      color: white;
      background: linear-gradient(135deg, #b94b1f, #d76a38);
    }

    .ghost-link {
      color: var(--ink);
      text-decoration: none;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 600;
    }

    .result-rank {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(198, 93, 46, 0.12);
      color: var(--accent-dark);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 700;
      font-size: 0.92rem;
      margin-right: 10px;
    }

    .result-title {
      font-size: 1.3rem;
      margin: 0;
    }

    .agent-note {
      background: rgba(24, 34, 47, 0.94);
      color: #f8f4ee;
      border-radius: 24px;
      padding: 20px 22px;
    }

    .mono {
      font-family: "SFMono-Regular", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9rem;
    }

    @media (max-width: 900px) {
      .hero-grid, .metric-grid, .feature-grid {
        grid-template-columns: 1fr;
      }

      .page-card {
        padding: 22px;
      }

      .display-title {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <nav class="brand-nav d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between gap-3">
      <a class="brand-mark" href="{{ url_for('home') }}">
        <span class="brand-dot"></span>
        <span>
          <span class="brand-title d-block">CineSeek</span>
          <p class="brand-subtitle">Semantic movie retrieval with agent reranking</p>
        </span>
      </a>
      <div class="d-flex flex-wrap gap-2">
        <a class="nav-pill" href="{{ url_for('home') }}">Overview</a>
        <a class="nav-pill" href="{{ url_for('search') }}">Search</a>
        <a class="nav-pill" href="https://github.com/maxwellyin/cineseek-semantic-search" target="_blank" rel="noreferrer">GitHub</a>
      </div>
    </nav>

    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
