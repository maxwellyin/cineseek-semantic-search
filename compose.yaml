services:
  cineseek:
    build: .
    container_name: cineseek
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      FLCR_AGENT_PROVIDER: ${FLCR_AGENT_PROVIDER:-groq}
      FLCR_GROQ_MODEL: ${FLCR_GROQ_MODEL:-qwen/qwen3-32b}
