services:
  cineseek:
    build: .
    container_name: cineseek
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      FLCR_AGENT_PROVIDER: ${FLCR_AGENT_PROVIDER:-gemini}
      FLCR_GEMINI_MODEL: ${FLCR_GEMINI_MODEL:-gemini-2.5-flash-lite}
