services:
  cineseek:
    build:
      context: .
      args:
        ASSET_BUNDLE_URL: ${ASSET_BUNDLE_URL:-https://github.com/maxwellyin/cineseek-semantic-search/releases/download/assets-current/cineseek-assets.tar.gz}
    container_name: cineseek
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      FLCR_AGENT_PROVIDER: ${FLCR_AGENT_PROVIDER:-groq}
      FLCR_GROQ_MODEL: ${FLCR_GROQ_MODEL:-qwen/qwen3-32b}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
